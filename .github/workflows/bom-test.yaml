
name: HIL tests
on:
  workflow_dispatch:
    inputs:
      distinct_id:
        description: "Run identifier"
        required: false
      reservation_name:
        required: false
        description: "Reservation Name"
        type: string
      os_version:
        description: "Optional camera OS version to install before the benchmark"
        required: false
        type: string
      hold_reservation:
        description: "Hold Testbed Reservation"
        required: false
        type: boolean
      depthai_version:
        description: "DepthAI version to test against (e.g., 3.3.0)"
        required: true
        type: string   
      additional_options:
        description: "Additional options:"
        required: false
        type: string

env:
  DISTINCT_ID: ${{ github.event.inputs.distinct_id }}
  DEPTHAI_VERSION: ${{ github.event.inputs.depthai_version }}
  HIL_FRAMEWORK_TOKEN: ${{ secrets.HIL_FRAMEWORK_TOKEN }}
  HUBAI_API_KEY: ${{ secrets.HUBAI_API_KEY }}
  RESERVATION_NAME: ${{ github.event.inputs.reservation_name }}
  HOLD_RESERVATION: ${{ github.event.inputs.hold_reservation }}
  ADDITIONAL_OPTIONS: ${{ github.event.inputs.additional_options }}
  INFLUX_BUCKET: fps_metrics
  INFLUX_TOKEN: ${{ secrets.INFLUX_TOKEN }}

jobs:
  id:
    name: Workflow ID Provider
    runs-on: ubuntu-latest
    steps:
      - name: echo distinct ID ${{ env.DISTINCT_ID }}
        run: echo $DISTINCT_ID
  BOM-test:
    runs-on: ["self-hosted", "testbed-runner"]
    steps:
      - uses: actions/checkout@v3

      - name: Run tests
        # yamllint disable rule:line-length
        run: |
          python3 -m venv venv
          source venv/bin/activate
          git clone --recurse-submodules -b tjb_influx_pusher https://oauth2:$HIL_FRAMEWORK_TOKEN@gitlab.luxonis.com/luxonis/hil_lab/hil_framework.git
          pip install ./hil_framework/

          if [[ -n "$RESERVATION_NAME" ]]; then
            RESERVATION_OPTION="--reservation-name $RESERVATION_NAME"
          else
            export RESERVATION_NAME="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID#modelconverter"
            RESERVATION_OPTION="--reservation-name $RESERVATION_NAME"
          fi

          if [[ "$HOLD_RESERVATION" == 'true' ]]; then
            HOLD_RESERVATION="--hold-reservation"
          fi

          if [[ -n "$ADDITIONAL_OPTIONS" ]]; then
            ADDITIONAL_OPTIONS="$ADDITIONAL_OPTIONS"
          fi
          OS_VERSION_OPTION=""
          if [[ -n "$OS_VERSION" ]]; then
            OS_VERSION_OPTION="--os-version $OS_VERSION"
          fi

          if [[ "$DEPTHAI_VERSION" =~ ^3\.[0-9]{1,2}\.[0-9]{1,2}$ ]]; then
            DEPTHAI_VERSION_CHECKED="$DEPTHAI_VERSION"
          fi
          : "${INFLUX_TOKEN:?INFLUX_TOKEN is required on the runner}"
          : "${INFLUX_BUCKET:?INFLUX_BUCKET must be set by the workflow}"

          REMOTE_CMD="cd /tmp/modelconverter && \
            ./tests/test_benchmark/run_hil_tests.sh \
              \"$HUBAI_API_KEY\" \
              \"$HIL_FRAMEWORK_TOKEN\" \
              \"$DEPTHAI_VERSION_CHECKED\" \
              \"$INFLUX_TOKEN\" \
              \"$GITHUB_RUN_ID\""

          exec hil_runner \
            --models "oak4_pro or oak4_d or oak4_s" \
            $HOLD_RESERVATION_OPTION \
            --wait \
            $OS_VERSION_OPTION \
            $RESERVATION_OPTION \
            --sync-workspace --rsync-args="--exclude=venv" \
            --commands "$REMOTE_CMD"
