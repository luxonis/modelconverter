name: Publish - RVC4

on:
  workflow_dispatch:

  release:
    types: [published]
    branches:
      - main

jobs:
  rvc4-publish:
    strategy:
      fail-fast: false
      matrix:
        version:
          - "2.32.6"
          - "2.41.0"

    uses: ./.github/workflows/publish.yaml
    secrets: inherit
    with:
      package: rvc4
      version: ${{ matrix.version }}
      default: "2.32.6"
